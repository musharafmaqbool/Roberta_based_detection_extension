<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification</title>

    <style>
        body {
            font-family: Arial;
            background: #fff5f5;
            padding: 40px;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <h1>URGENT ACCOUNT VERIFICATION</h1>

        <p>
            Your bank account has been suspended.
        </p>

        <p>
            Verify your password immediately to restore access.
        </p>

        <input type="text" placeholder="Enter Email">

        <input type="password" placeholder="Enter Password">

        <button>VERIFY ACCOUNT</button>

    </div>

</body>

</html>
