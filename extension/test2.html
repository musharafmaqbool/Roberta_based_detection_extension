<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Pattern Demo</title>

    <style>
        body {
            font-family: Arial;
            background: #fff8f0;
            padding: 40px;
        }

        .offer-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 650px;
            margin: auto;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
        }

        button {
            padding: 12px 25px;
            margin-top: 15px;
            background: #ff5722;
            border: none;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div class="offer-box" role="alert">

        <h1>LIMITED TIME OFFER!</h1>

        <p>
            Hurry! Only 2 items left in stock.
        </p>

        <p>
            Last chance to claim your exclusive discount.
        </p>

        <p>
            No thanks, I hate saving money.
        </p>

        <button>BUY NOW — Limited Time Only!</button>

    </div>

</body>

</html>
